services:
  db:
    image: postgres:16-alpine
    container_name: process-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: process
      POSTGRES_PASSWORD: process
      POSTGRES_DB: process
    ports:
      - "5432:5432"
    volumes:
      - process-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U process -d process"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  process-pgdata:
