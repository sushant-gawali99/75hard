<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=block">
  <style>
    *{ box-sizing:border-box; -webkit-font-smoothing:antialiased; }
    body{ margin:0; }
    @keyframes wlRise{
      0%{ opacity:0; transform:translateY(16px); }
      100%{ opacity:1; transform:translateY(0); }
    }
    @keyframes wlFade{
      0%{ opacity:0; }
      100%{ opacity:1; }
    }
    @keyframes wlBreathe{
      0%,100%{ transform:scale(1); opacity:.85; }
      50%{ transform:scale(1.12); opacity:1; }
    }
    @keyframes wlBreatheSlow{
      0%,100%{ transform:scale(1.05); opacity:.5; }
      50%{ transform:scale(.92); opacity:.75; }
    }
    .wl-rise{ animation:wlRise .9s cubic-bezier(.22,1,.36,1) both; }
  </style>
</helmet>

<div style="min-height:100vh; width:100%; display:flex; align-items:center; justify-content:center; padding:40px 20px; background:radial-gradient(120% 90% at 50% 0%, #EAF3E7 0%, #E2EEE0 45%, #D6E6D2 100%); font-family:'Inter',system-ui,sans-serif;">

  <!-- PHONE -->
  <div style="position:relative; width:418px; padding:14px; border-radius:46px; background:linear-gradient(155deg,#26312b,#161e19); box-shadow:0 40px 90px -20px rgba(28,52,38,.55), 0 8px 24px rgba(40,80,55,.18), inset 0 0 0 1.5px rgba(255,255,255,.06);">

    <div style="position:relative; width:390px; height:812px; border-radius:34px; overflow:hidden; background:#F4F8F1; display:flex; flex-direction:column;">

      <!-- BACKGROUND GLOWS (multi-hue) -->
      <div style="position:absolute; top:-170px; left:50%; transform:translateX(-50%); width:540px; height:540px; border-radius:50%; background:radial-gradient(circle at 42% 42%, rgba(43,197,111,.34) 0%, rgba(22,194,166,.24) 34%, rgba(14,143,224,.16) 58%, rgba(14,143,224,0) 74%); filter:blur(8px); animation:wlBreathe 7s ease-in-out infinite; pointer-events:none;"></div>
      <div style="position:absolute; top:10px; right:-130px; width:360px; height:360px; border-radius:50%; background:radial-gradient(circle at 50% 50%, rgba(106,92,240,.18) 0%, rgba(22,194,166,.14) 50%, rgba(22,194,166,0) 72%); filter:blur(12px); animation:wlBreatheSlow 9s ease-in-out infinite; pointer-events:none;"></div>
      <div style="position:absolute; top:90px; left:-120px; width:320px; height:320px; border-radius:50%; background:radial-gradient(circle at 50% 50%, rgba(240,153,42,.16) 0%, rgba(43,197,111,.12) 52%, rgba(43,197,111,0) 72%); filter:blur(12px); animation:wlBreathe 8.5s ease-in-out .8s infinite; pointer-events:none;"></div>

      <!-- ORGANIC TOPOGRAPHIC MOTIF -->
      <svg viewBox="0 0 390 812" preserveAspectRatio="xMidYMid slice" style="position:absolute; inset:0; width:100%; height:100%; opacity:.06; pointer-events:none;">
        <g fill="none" stroke="#1E6B3C" stroke-width="1.4">
          <path d="M-40 250 C 80 180, 180 320, 300 250 S 460 320, 520 250"></path>
          <path d="M-40 300 C 80 230, 180 370, 300 300 S 460 370, 520 300"></path>
          <path d="M-40 360 C 90 290, 190 430, 310 360 S 470 430, 520 360"></path>
          <path d="M-40 430 C 100 360, 200 500, 320 430 S 480 500, 520 430"></path>
          <path d="M-40 520 C 110 450, 210 590, 330 520 S 490 590, 540 520"></path>
          <ellipse cx="300" cy="120" rx="64" ry="100" transform="rotate(38 300 120)"></ellipse>
          <path d="M268 60 C 300 95, 312 150, 312 180" ></path>
          <ellipse cx="70" cy="640" rx="50" ry="80" transform="rotate(-32 70 640)"></ellipse>
        </g>
      </svg>

      <!-- status bar (transparent) -->
      <div style="height:44px; flex:none; display:flex; align-items:center; justify-content:space-between; padding:0 22px; position:relative; z-index:5;">
        <span style="font-size:14px; font-weight:600; color:#23332A; font-variant-numeric:tabular-nums; letter-spacing:.2px;">9:30</span>
        <div style="position:absolute; left:50%; top:11px; transform:translateX(-50%); width:11px; height:11px; border-radius:50%; background:#0c120e;"></div>
        <div style="display:flex; align-items:center; gap:6px; color:#23332A;">
          <span style="font-family:'Material Symbols Rounded'; font-size:17px; font-variation-settings:'FILL' 1,'wght' 500;">signal_cellular_alt</span>
          <span style="font-family:'Material Symbols Rounded'; font-size:17px; font-variation-settings:'FILL' 1,'wght' 500;">wifi</span>
          <span style="font-family:'Material Symbols Rounded'; font-size:18px; font-variation-settings:'FILL' 1,'wght' 500;">battery_full</span>
        </div>
      </div>

      <!-- CONTENT -->
      <div style="position:relative; z-index:2; flex:1; min-height:0; display:flex; flex-direction:column; padding:0 32px 44px;">

        <!-- wordmark -->
        <div class="wl-rise" style="display:flex; align-items:center; justify-content:center; gap:9px; margin-top:26px;">
          <div style="width:30px; height:30px; border-radius:9px; background:linear-gradient(135deg,#2BC56F,#16C2A6); display:flex; align-items:center; justify-content:center; box-shadow:0 6px 14px -4px rgba(22,194,166,.6);">
            <span style="font-family:'Material Symbols Rounded'; font-size:19px; font-variation-settings:'FILL' 1,'wght' 600; color:#fff;">eco</span>
          </div>
          <span style="font-family:'Plus Jakarta Sans',sans-serif; font-weight:800; font-size:19px; letter-spacing:-.01em; color:#23332A;">Process</span>
        </div>

        <!-- HERO -->
        <div style="flex:1; min-height:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;">

          <h1 class="wl-rise" style="margin:0; animation-delay:.12s; font-family:'Plus Jakarta Sans',sans-serif; font-weight:800; font-size:35px; line-height:1.22; letter-spacing:-.03em; color:#23332A; text-wrap:balance; max-width:330px;">Real change happens only by following <span style="background:linear-gradient(110deg,#2BC56F 0%,#16C2A6 42%,#0E8FE0 78%,#6A5CF0 100%); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;">the process daily.</span></h1>

          <p class="wl-rise" style="margin:20px 0 0; animation-delay:.26s; font-size:16px; font-weight:500; line-height:1.55; color:#7C9080; max-width:280px; text-wrap:pretty;">Pick your days. Set your rules. Show up every day.</p>

          <!-- value chips -->
          <div class="wl-rise" style="display:flex; align-items:center; justify-content:center; gap:9px; margin-top:34px; flex-wrap:wrap; animation-delay:.4s;">
            <div style="display:flex; align-items:center; gap:6px; height:36px; padding:0 14px 0 12px; border-radius:100px; background:rgba(220,240,216,.85); border:1px solid #C6E6C0; box-shadow:0 2px 8px rgba(40,80,55,.05);">
              <span style="font-family:'Material Symbols Rounded'; font-size:18px; font-variation-settings:'FILL' 1,'wght' 500; color:#21B96B;">favorite</span>
              <span style="font-size:13.5px; font-weight:700; color:#1E6B3C; letter-spacing:-.01em;">Commit</span>
            </div>
            <div style="display:flex; align-items:center; gap:6px; height:36px; padding:0 14px 0 12px; border-radius:100px; background:rgba(220,238,252,.85); border:1px solid #C3E2F8; box-shadow:0 2px 8px rgba(40,80,55,.05);">
              <span style="font-family:'Material Symbols Rounded'; font-size:18px; font-variation-settings:'FILL' 0,'wght' 500; color:#0E8FE0;">tune</span>
              <span style="font-size:13.5px; font-weight:700; color:#1F5E86; letter-spacing:-.01em;">Your rules</span>
            </div>
            <div style="display:flex; align-items:center; gap:6px; height:36px; padding:0 14px 0 12px; border-radius:100px; background:rgba(232,230,253,.85); border:1px solid #D6D2F8; box-shadow:0 2px 8px rgba(40,80,55,.05);">
              <span style="font-family:'Material Symbols Rounded'; font-size:18px; font-variation-settings:'FILL' 0,'wght' 500; color:#7A57F0;">trending_up</span>
              <span style="font-size:13.5px; font-weight:700; color:#5240B8; letter-spacing:-.01em;">See change</span>
            </div>
          </div>
        </div>

        <!-- CTA -->
        <div class="wl-rise" style="animation-delay:.54s;">
          <button onClick="{{ google }}" style="width:100%; height:56px; border:1px solid #DBE2DA; border-radius:100px; cursor:pointer; background:#FFFFFF; color:#3C4043; font-family:'Roboto','Inter',sans-serif; font-weight:500; font-size:16px; letter-spacing:.1px; display:flex; align-items:center; justify-content:center; gap:12px; box-shadow:0 6px 18px -8px rgba(40,80,55,.18);" style-hover="border-color:#C7D2C4; box-shadow:0 10px 24px -10px rgba(40,80,55,.26); transform:translateY(-1px);" style-active="transform:translateY(1px) scale(.99);">
            <svg width="20" height="20" viewBox="0 0 48 48" style="flex:none;">
              <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
              <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
              <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
              <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
            </svg>
            Continue with Google
          </button>
          <p style="margin:14px 0 0; text-align:center; font-family:'Inter',sans-serif; font-size:12px; line-height:1.5; font-weight:500; color:#9CADA0; letter-spacing:0;">By continuing you agree to our <span style="color:#7C9080; font-weight:600;">Terms</span> &amp; <span style="color:#7C9080; font-weight:600;">Privacy</span>.</p>
        </div>

      </div>

      <!-- gesture pill -->
      <div style="position:absolute; bottom:7px; left:50%; transform:translateX(-50%); width:120px; height:5px; border-radius:3px; background:#23332A; opacity:.18; z-index:6;"></div>

    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:470,&quot;height&quot;:910}}">
class Component extends DCLogic {
  google = ()=>{};
  renderVals(){
    return { google: this.google };
  }
}
</script>
</body>
</html>
