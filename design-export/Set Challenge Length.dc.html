<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=block">
  <style>
    *{ box-sizing:border-box; -webkit-font-smoothing:antialiased; }
    body{ margin:0; }
    @keyframes scRise{ 0%{ opacity:0; transform:translateY(14px); } 100%{ opacity:1; transform:translateY(0); } }
    @keyframes scStepperIn{ 0%{ opacity:0; transform:translateY(8px) scale(.97); } 100%{ opacity:1; transform:translateY(0) scale(1); } }
    .sc-rise{ animation:scRise .8s cubic-bezier(.22,1,.36,1) both; }
  </style>
</helmet>

<div style="min-height:100vh; width:100%; display:flex; align-items:center; justify-content:center; padding:40px 20px; background:radial-gradient(120% 90% at 50% 0%, #EAF3E7 0%, #E2EEE0 45%, #D6E6D2 100%); font-family:'Inter',system-ui,sans-serif;">

  <!-- PHONE -->
  <div style="position:relative; width:418px; padding:14px; border-radius:46px; background:linear-gradient(155deg,#26312b,#161e19); box-shadow:0 40px 90px -20px rgba(28,52,38,.55), 0 8px 24px rgba(40,80,55,.18), inset 0 0 0 1.5px rgba(255,255,255,.06);">

    <div style="position:relative; width:390px; height:812px; border-radius:34px; overflow:hidden; background:#F4F8F1; display:flex; flex-direction:column;">

      <!-- soft glow -->
      <div style="position:absolute; top:-160px; left:50%; transform:translateX(-50%); width:520px; height:520px; border-radius:50%; background:radial-gradient(circle at 42% 42%, rgba(43,197,111,.22) 0%, rgba(22,194,166,.15) 38%, rgba(14,143,224,.08) 62%, rgba(14,143,224,0) 76%); filter:blur(8px); pointer-events:none;"></div>

      <!-- status bar -->
      <div style="height:44px; flex:none; display:flex; align-items:center; justify-content:space-between; padding:0 22px; position:relative; z-index:5;">
        <span style="font-size:14px; font-weight:600; color:#23332A; font-variant-numeric:tabular-nums; letter-spacing:.2px;">9:30</span>
        <div style="position:absolute; left:50%; top:11px; transform:translateX(-50%); width:11px; height:11px; border-radius:50%; background:#0c120e;"></div>
        <div style="display:flex; align-items:center; gap:6px; color:#23332A;">
          <span style="font-family:'Material Symbols Rounded'; font-size:17px; font-variation-settings:'FILL' 1,'wght' 500;">signal_cellular_alt</span>
          <span style="font-family:'Material Symbols Rounded'; font-size:17px; font-variation-settings:'FILL' 1,'wght' 500;">wifi</span>
          <span style="font-family:'Material Symbols Rounded'; font-size:18px; font-variation-settings:'FILL' 1,'wght' 500;">battery_full</span>
        </div>
      </div>

      <!-- TOP APP BAR -->
      <div style="position:relative; z-index:3; flex:none; padding:6px 20px 0;">
        <div style="display:flex; align-items:center; gap:14px;">
          <button onClick="{{ back }}" style="width:44px; height:44px; flex:none; margin-left:-10px; border:none; background:none; cursor:pointer; display:flex; align-items:center; justify-content:center; border-radius:50%; color:#23332A;" style-hover="background:rgba(35,51,42,.06);" style-active="transform:scale(.92);">
            <span style="font-family:'Material Symbols Rounded'; font-size:25px; font-variation-settings:'wght' 500;">arrow_back</span>
          </button>
          <div style="flex:1; min-width:0;">
            <div style="height:6px; border-radius:100px; background:#DBEBD6; overflow:hidden;">
              <div style="height:100%; width:33.3%; border-radius:100px; background:linear-gradient(110deg,#2BC56F 0%,#16C2A6 55%,#0E8FE0 100%); transition:width .6s cubic-bezier(.22,1,.36,1);"></div>
            </div>
          </div>
          <span style="flex:none; font-size:12.5px; font-weight:700; letter-spacing:.02em; color:#7C9080; font-variant-numeric:tabular-nums;">Step 1 of 3</span>
        </div>
      </div>

      <!-- CONTENT -->
      <div style="position:relative; z-index:2; flex:1; min-height:0; display:flex; flex-direction:column; padding:26px 28px 0; overflow:hidden;">

        <!-- heading -->
        <h1 class="sc-rise" style="margin:0; font-family:'Plus Jakarta Sans',sans-serif; font-weight:800; font-size:28px; line-height:1.22; letter-spacing:-.025em; color:#23332A; text-wrap:balance; max-width:320px;">How many days will you commit?</h1>
        <p class="sc-rise" style="margin:12px 0 0; animation-delay:.08s; font-size:15px; font-weight:500; line-height:1.55; color:#7C9080; max-width:300px; text-wrap:pretty;">Choose a window you'll show up for — every single day.</p>

        <!-- BIG NUMBER -->
        <div class="sc-rise" style="animation-delay:.16s; flex:1; min-height:0; display:flex; flex-direction:column; align-items:center; justify-content:center;">
          <span ref="{{ setNumRef }}" style="font-family:'Plus Jakarta Sans',sans-serif; font-weight:800; font-size:140px; line-height:.92; letter-spacing:-.05em; font-variant-numeric:tabular-nums; background:linear-gradient(135deg,#2BC56F 0%,#16C2A6 45%,#0E8FE0 78%,#6A5CF0 100%); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;">{{ value }}</span>
          <span style="margin-top:2px; font-family:'Plus Jakarta Sans',sans-serif; font-weight:700; font-size:16px; letter-spacing:.18em; text-transform:uppercase; color:#9DB2A2;">days</span>
        </div>

        <!-- CUSTOM STEPPER (conditional) -->
        <sc-if value="{{ customMode }}" hint-placeholder-val="{{ false }}">
          <div style="display:flex; align-items:center; justify-content:center; gap:18px; margin-bottom:22px; animation:scStepperIn .42s cubic-bezier(.34,1.4,.5,1) both;">
            <button onClick="{{ dec }}" style="width:58px; height:58px; flex:none; border:none; border-radius:50%; cursor:pointer; background:#fff; box-shadow:0 6px 16px rgba(40,80,55,.1); display:flex; align-items:center; justify-content:center; color:#23332A;" style-hover="box-shadow:0 8px 20px rgba(40,80,55,.16);" style-active="transform:scale(.92);">
              <span style="font-family:'Material Symbols Rounded'; font-size:28px; font-variation-settings:'wght' 600;">remove</span>
            </button>
            <div style="min-width:96px; text-align:center; padding:10px 14px; border-radius:18px; background:#fff; box-shadow:0 6px 16px rgba(40,80,55,.08);">
              <span style="font-family:'Plus Jakarta Sans',sans-serif; font-weight:800; font-size:28px; letter-spacing:-.02em; color:#23332A; font-variant-numeric:tabular-nums;">{{ value }}</span>
              <span style="font-size:13px; font-weight:600; color:#9DB2A2; margin-left:5px;">days</span>
            </div>
            <button onClick="{{ inc }}" style="width:58px; height:58px; flex:none; border:none; border-radius:50%; cursor:pointer; background:linear-gradient(135deg,#2BC56F,#16C2A6); box-shadow:0 8px 18px -4px rgba(22,194,166,.55); display:flex; align-items:center; justify-content:center; color:#fff;" style-hover="box-shadow:0 10px 22px -4px rgba(22,194,166,.7);" style-active="transform:scale(.92);">
              <span style="font-family:'Material Symbols Rounded'; font-size:28px; font-variation-settings:'wght' 600;">add</span>
            </button>
          </div>
        </sc-if>

        <!-- PRESET CHIPS -->
        <div class="sc-rise" style="animation-delay:.24s; display:flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:9px; padding-bottom:4px;">
          <sc-for list="{{ chips }}" as="chip" hint-placeholder-count="5">
            <button onClick="{{ chip.select }}" style="display:flex; align-items:center; gap:5px; height:40px; padding:{{ chip.padding }}; border-radius:100px; cursor:pointer; border:{{ chip.border }}; background:{{ chip.bg }}; box-shadow:{{ chip.shadow }}; color:{{ chip.color }}; font-family:'Plus Jakarta Sans',sans-serif; font-weight:700; font-size:15px; letter-spacing:-.01em; font-variant-numeric:tabular-nums; transition:background .2s, color .2s, box-shadow .2s;" style-active="transform:scale(.95);">
              <sc-if value="{{ chip.active }}" hint-placeholder-val="{{ false }}">
                <span style="font-family:'Material Symbols Rounded'; font-size:18px; font-variation-settings:'wght' 600;">check</span>
              </sc-if>
              {{ chip.label }}
            </button>
          </sc-for>
        </div>

        <!-- helper line -->
        <div class="sc-rise" style="animation-delay:.3s; display:flex; align-items:center; justify-content:center; gap:7px; margin-top:18px; padding:0 12px;">
          <span style="font-family:'Material Symbols Rounded'; font-size:17px; font-variation-settings:'FILL' 1,'wght' 500; color:#21B96B;">spa</span>
          <span style="font-size:13.5px; font-weight:600; line-height:1.4; color:#8AA08E; letter-spacing:-.01em; text-wrap:pretty; text-align:center;">Choose with intention — this sets your whole journey.</span>
        </div>

      </div>

      <!-- CTA -->
      <div class="sc-rise" style="position:relative; z-index:2; flex:none; padding:18px 28px 30px; animation-delay:.36s;">
        <button onClick="{{ cont }}" style="width:100%; height:58px; border:none; border-radius:100px; cursor:pointer; background:linear-gradient(135deg,#2BC56F,#16C2A6); color:#fff; font-family:'Plus Jakarta Sans',sans-serif; font-weight:700; font-size:17px; letter-spacing:-.01em; display:flex; align-items:center; justify-content:center; gap:8px; box-shadow:0 14px 30px -8px rgba(22,194,166,.6);" style-hover="box-shadow:0 18px 36px -8px rgba(22,194,166,.7); transform:translateY(-1px);" style-active="transform:translateY(1px) scale(.99);">
          Continue
          <span style="font-family:'Material Symbols Rounded'; font-size:21px; font-variation-settings:'wght' 600;">arrow_forward</span>
        </button>
      </div>

      <!-- gesture pill -->
      <div style="position:absolute; bottom:7px; left:50%; transform:translateX(-50%); width:120px; height:5px; border-radius:3px; background:#23332A; opacity:.18; z-index:6;"></div>

    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:470,&quot;height&quot;:910},&quot;startDays&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:75,&quot;tsType&quot;:&quot;number&quot;,&quot;min&quot;:1,&quot;max&quot;:365}}">
class Component extends DCLogic {
  constructor(props){
    super(props);
    this._numEl = null;
    this.presets = [21, 30, 60, 75, 90];
    this.state = {
      value: this.props.startDays ?? 75,
      customMode: false,
    };
  }

  setNumRef = (el)=>{ this._numEl = el; };

  bumpNumber(){
    if(this._numEl){
      this._numEl.animate(
        [{transform:'scale(1)'},{transform:'scale(1.07)'},{transform:'scale(1)'}],
        {duration:340, easing:'cubic-bezier(.34,1.56,.64,1)'}
      );
    }
  }

  selectPreset(n){
    this.setState({ value:n, customMode:false });
    this.bumpNumber();
  }

  openCustom = ()=>{
    this.setState({ customMode:true });
  };

  inc = ()=>{
    this.setState(s=>({ value: Math.min(365, s.value + 1) }));
    this.bumpNumber();
  };
  dec = ()=>{
    this.setState(s=>({ value: Math.max(1, s.value - 1) }));
    this.bumpNumber();
  };

  back = ()=>{};
  cont = ()=>{};

  renderVals(){
    const { value, customMode } = this.state;
    const activeGrad = 'linear-gradient(135deg,#2BC56F,#16C2A6)';

    const chips = this.presets.map(n=>{
      const active = !customMode && value === n;
      return {
        label: String(n),
        active,
        select: ()=> this.selectPreset(n),
        padding: active ? '0 16px 0 12px' : '0 18px',
        border: active ? '1.5px solid rgba(0,0,0,0)' : '1.5px solid #CFE2C8',
        bg: active ? activeGrad : 'rgba(255,255,255,.7)',
        color: active ? '#fff' : '#3A4A40',
        shadow: active ? '0 8px 18px -5px rgba(22,194,166,.55)' : 'none',
      };
    });

    // Custom chip
    chips.push({
      label: 'Custom',
      active: customMode,
      select: this.openCustom,
      padding: customMode ? '0 16px 0 12px' : '0 16px',
      border: customMode ? '1.5px solid rgba(0,0,0,0)' : '1.5px solid #CFE2C8',
      bg: customMode ? activeGrad : 'rgba(255,255,255,.7)',
      color: customMode ? '#fff' : '#3A4A40',
      shadow: customMode ? '0 8px 18px -5px rgba(22,194,166,.55)' : 'none',
    });

    return {
      value,
      customMode,
      chips,
      inc: this.inc,
      dec: this.dec,
      back: this.back,
      cont: this.cont,
      setNumRef: this.setNumRef,
    };
  }
}
</script>
</body>
</html>
